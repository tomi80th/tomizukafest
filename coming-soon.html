<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Marriott Bonvoy</title>
    <style>
        /* Base Reset and Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            height: 100%;
            background-color: #f5f5f5; /* Clean, light gray background */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        /* Centered Card Container */
        .coming-soon-container {
            background-color: #ffffff;
            max-width: 500px;
            width: 90%;
            padding: 60px 40px; /* Increased padding slightly */
            text-align: center;
            border-top: 4px solid #8e6f3e; /* Signature Bonvoy Gold/Bronze */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        /* Brand Accent */
        .brand-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8e6f3e;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* Headings */
        h1 {
            font-family: "Georgia", "Times New Roman", serif; /* Elegant serif for premium feel */
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            color: #1a1a1a;
        }

        /* Subtle Divider */
        .divider {
            width: 40px;
            height: 1px;
            background-color: #d8d8d8;
            margin: 0 auto 20px auto;
        }

        /* Body Copy */
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #555555;
            margin-bottom: 40px; /* Spacing before the button */
        }

        /* Marriott Bonvoy Styled Button */
        .return-btn {
            display: inline-block;
            background-color: #1a1a1a; /* Dark gray/black button */
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 18px 30px;
            border-radius: 2px;
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
        }

        /* Button Hover State */
        .return-btn:hover {
            background-color: #333333; /* Slightly lighter on hover */
        }
    </style>
</head>
<body>

    <div class="coming-soon-container">
        <div class="brand-text">Tomizuka Fest</div>
        <h1>Coming Soon</h1>
        <div class="divider"></div>
        <p>We are currently working on the academic family tree of Prof Tomizuka.</p>
        
        <a href="index.html" class="return-btn">Return to Main Page</a>
        
    </div>

</body>
</html>
